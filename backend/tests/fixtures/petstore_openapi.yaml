openapi: "3.0.3"
info:
  title: Petstore API (YAML)
  version: "1.0.0"
  description: A sample API in YAML format
servers:
  - url: https://petstore-yaml.example.com/v1
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      tags:
        - users
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: A list of users
    post:
      summary: Create user
      operationId: createUser
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                age:
                  type: integer
                  minimum: 0
                  maximum: 150
      responses:
        "201":
          description: User created
        "400":
          description: Invalid input
